name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - feature
      - 'feature/**'

  pull_request:
    branches:
      - main

  workflow_dispatch:

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/demo-godi

jobs:
  # ========================================
  # CI - TEST
  # ========================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --runInBand


  # ========================================
  # CD - BUILD & PUSH DOCKER IMAGE
  # Only run when pushing to main
  # ========================================
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    needs:
      - test

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: ./src
          file: ./src/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
            ${{ env.DOCKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max


  # ========================================
  # CD - DEPLOY TO AWS EC2
  # ========================================
  deploy:
  name: Deploy to EC2 Instances

  runs-on: ubuntu-latest

  needs:
    - build

  if: github.event_name == 'push' && github.ref == 'refs/heads/main'

  environment:
    name: production

  steps:
    # ========================================
    # Configure SSH
    # ========================================
    - name: Configure SSH
      run: |
        mkdir -p ~/.ssh

        printf '%s\n' "${{ secrets.EC2_SSH_KEY }}  " > ~/.ssh/ec2_key
        chmod 600 ~/.ssh/ec2_key

        printf '%s\n' "${{ secrets.EC2_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
        chmod 644 ~/.ssh/known_hosts


    # ========================================
    # Deploy EC2 #1
    # ========================================
    - name: Deploy EC2 #1
      env:
        EC2_HOST: ${{ secrets.EC2_HOST_1 }}
        EC2_USER: ${{ secrets.EC2_USER }}
        IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/demo-godi:${{ github.sha }}
      run: |
        ssh -i ~/.ssh/ec2_key "$EC2_USER@$EC2_HOST" "
          set -e

          echo '===== Deploying EC2 #1 ====='

          echo 'Pulling Docker image...'
          sudo docker pull '$IMAGE'

          echo 'Removing old container...'
          sudo docker rm -f demo-godi || true

          echo 'Starting new container...'
          sudo docker run -d \
            --name demo-godi \
            --restart unless-stopped \
            -p 80:3000 \
            '$IMAGE'

          echo 'Waiting for application...'
          sleep 5

          echo 'Checking application...'
          curl --fail http://localhost/ || exit 1

          echo 'EC2 #1 deployment successful!'
        "


    # ========================================
    # Wait before deploying next instance
    # ========================================
    - name: Wait for EC2 #1 to stabilize
      run: sleep 15


    # ========================================
    # Deploy EC2 #2
    # ========================================
    - name: Deploy EC2 #2
      env:
        EC2_HOST: ${{ secrets.EC2_HOST_2 }}
        EC2_USER: ${{ secrets.EC2_USER }}
        IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/demo-godi:${{ github.sha }}
      run: |
        ssh -i ~/.ssh/ec2_key "$EC2_USER@$EC2_HOST" "
          set -e

          echo '===== Deploying EC2 #2 ====='

          echo 'Pulling Docker image...'
          sudo docker pull '$IMAGE'

          echo 'Removing old container...'
          sudo docker rm -f demo-godi || true

          echo 'Starting new container...'
          sudo docker run -d \
            --name demo-godi \
            --restart unless-stopped \
            -p 80:3000 \
            '$IMAGE'

          echo 'Waiting for application...'
          sleep 5

          echo 'Checking application...'
          curl --fail http://localhost/ || exit 1

          echo 'EC2 #2 deployment successful!'
        "


    # ========================================
    # Cleanup
    # ========================================
    - name: Cleanup old Docker images
      env:
        EC2_HOST_1: ${{ secrets.EC2_HOST_1 }}
        EC2_HOST_2: ${{ secrets.EC2_HOST_2 }}
        EC2_USER: ${{ secrets.EC2_USER }}
      run: |
        ssh -i ~/.ssh/ec2_key "$EC2_USER@$EC2_HOST_1" \
          "sudo docker image prune -f"

        ssh -i ~/.ssh/ec2_key "$EC2_USER@$EC2_HOST_2" \
          "sudo docker image prune -f"
